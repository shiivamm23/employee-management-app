version: "3.8"

services:

  mysql:
    image: mysql:8
    container_name: mysql

    environment:
      MYSQL_ROOT_PASSWORD: root123

    ports:
      - "3306:3306"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend

    container_name: backend

    ports:
      - "5000:5000"

    depends_on:
      - mysql

  frontend:
    build: ./frontend

    container_name: frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend